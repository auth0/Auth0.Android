name: Publish release to Java

inputs:
  java-version:
    required: true
  ossr-username:
    required: true
  ossr-token:
    required: true
  signing-key:
    required: true
  signing-password:
    required: true


runs:
  using: composite

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # pin@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # pin@v4

    - uses: gradle/actions/wrapper-validation-action@ed408507eac070d1f99cc633dbcf757c94c7933a # pin@v4

    - name: Publish Android/Java Packages to Maven
      shell: bash
      run: ./gradlew publishToSonatype closeSonatypeStagingRepository -PisSnapshot=false --stacktrace
      env:
        MAVEN_USERNAME: ${{ inputs.ossr-username }}
        MAVEN_PASSWORD: ${{ inputs.ossr-token }}
        SIGNING_KEY: ${{ inputs.signing-key}}
        SIGNING_PASSWORD: ${{ inputs.signing-password}}
